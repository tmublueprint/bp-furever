services:
  backend:
    build: ./backend
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=development
      - PORT=3003
    volumes:
      - ./backend/src:/app/src

  frontend:
    build: ./frontend
    ports:
      - "3004:80"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
  
  firebase-emulator:
    build:
      context: ./backend
      dockerfile: Dockerfile.emulator
    ports:
      - "3005:3005"  # Firestore
      - "3006:3006"  # Emulator UI
      - "9099:9099"  # Auth emulator
      - "9199:9199"  # Cloud storage