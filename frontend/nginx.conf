server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  # allow larger uploads (images + PDFs)
  client_max_body_size 100M;

  # makes the routes work
  location / {
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    proxy_pass http://backend:3003;
  }
}